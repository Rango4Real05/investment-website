<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: url('https://images.unsplash.com/photo-1609220136736-443140cffec6') no-repeat center center/cover;
}

/* OVERLAY */
.overlay {
  background: rgba(0,0,0,0.8);
  min-height: 100vh;
  padding: 20px;
}

/* CARD */
.card {
  background: rgba(0,0,0,0.7);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 15px;
}

/* BUTTONS */
.btn {
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, purple, blue);
  color: white;
  cursor: pointer;
  margin: 5px;
  width: 48%;
}

/* FLEX */
.flex {
  display: flex;
  justify-content: space-between;
}

/* BIG TEXT */
.balance {
  font-size: 28px;
  color: gold;
}
</style>
</head>

<body>

<div class="overlay">

<h2>Welcome, <span id="username">Loading...</span> 👋</h2>

<!-- BALANCE -->
<div class="card">
  <h3>Total Balance</h3>
  <div class="balance">$<span id="balance">0</span></div>
</div>

<!-- PLAN -->
<div class="card">
  <h3>Your Plan</h3>
  <p id="plan">Loading...</p>
</div>

<!-- ACTIONS -->
<div class="card flex">
  <button class="btn" onclick="goDeposit()">Deposit</button>
  <button class="btn" onclick="goWithdraw()">Withdraw</button>
</div>

<!-- STATS -->
<div class="card flex">
  <div>
    <h4>Profit</h4>
    <p>$0</p>
  </div>
  <div>
    <h4>Invested</h4>
    <p>$0</p>
  </div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// SUPABASE
const supabase = window.supabase.createClient(
  "https://xuueibsdniefncdbnfzn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1dWVpYnNkbmllZm5jZGJuZnpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNzM2MzksImV4cCI6MjA5MDY0OTYzOX0.CemivJ22fNWnLpMUHZPUiZoH12cg-az7k95PtKMFzf4"
);

// LOAD USER DATA
async function loadUser() {

  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const { data } = await supabase
    .from("users")
    .select("*")
    .eq("email", user.email)
    .single();

  if (data) {
    document.getElementById("username").innerText = data.name || "User";
    document.getElementById("balance").innerText = data.balance || 0;
    document.getElementById("plan").innerText = data.plan || "No Plan";
  }
}

loadUser();

// ✅ FIXED BUTTONS (ONLY CHANGE)
window.goDeposit = function () {
  window.location.href = "./deposit.html";
};

window.goWithdraw = function () {
  window.location.href = "./withdraw.html";
};
</script>

</body>
</html>
