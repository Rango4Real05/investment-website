<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
    body { background:#0f172a; color:white; font-family:Arial; }
    .container { padding:20px; }

    .card {
      background:rgba(30,41,59,0.6);
      padding:20px;
      border-radius:12px;
      margin:10px 0;
    }

    .btn {
      background:linear-gradient(gold,orange);
      padding:10px;
      border:none;
      margin:5px;
      cursor:pointer;
    }

    .balance {
      font-size:28px;
      color:gold;
    }
  </style>
</head>

<body>

<div class="container">

<h1>Dashboard</h1>

<div class="card">
  <p id="user-email"></p>
  <h2 id="balance" class="balance">$0</h2>
  <p id="plan"></p>
</div>

<div class="card">
  <button class="btn" onclick="goDeposit()">Deposit</button>
  <button class="btn" onclick="goWithdraw()">Withdraw</button>
  <button class="btn" onclick="logout()">Logout</button>
</div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://xuueibsdniefncdbnfzn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1dWVpYnNkbmllZm5jZGJuZnpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNzM2MzksImV4cCI6MjA5MDY0OTYzOX0.CemivJ22fNWnLpMUHZPUiZoH12cg-az7k95PtKMFzf4"
);

const { data:{user} } = await supabase.auth.getUser();

if(user){
  document.getElementById("user-email").innerText = user.email;

  let { data } = await supabase
    .from("users")
    .select("*")
    .eq("email",user.email)
    .single();

  document.getElementById("balance").innerText = "$"+data.balance;
  document.getElementById("plan").innerText = "Plan: "+data.plan;
}

window.goDeposit=()=>window.location.href="deposit.html";
window.goWithdraw=()=>window.location.href="withdraw.html";

window.logout=async()=>{
  await supabase.auth.signOut();
  window.location.href="login.html";
};
</script>

</body>
</html>
