<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f1a;
  color: white;
}

/* HEADER */
.header {
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* CARD */
.card {
  background: #111827;
  margin: 10px;
  padding: 15px;
  border-radius: 15px;
}

/* STATS GRID */
.stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.stat {
  background: #1f2937;
  padding: 15px;
  border-radius: 12px;
}

/* BUTTON */
.btn {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg, purple, blue);
  color: white;
  margin-top: 10px;
  cursor: pointer;
}

/* WATCHLIST */
.watchlist-item {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  border-bottom: 1px solid #333;
}

/* PROFIT COLORS */
.green { color: #00ff9d; }
.red { color: #ff4d4d; }

/* BOTTOM NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111827;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}
</style>
</head>

<body>

<div class="header">
  <h3>Welcome, <span id="username">User</span></h3>
</div>

<!-- BALANCE -->
<div class="card">
  <h4>Available Balance</h4>
  <h2>$<span id="balance">0</span></h2>
</div>

<!-- STATS -->
<div class="stats">

  <div class="stat">
    <h4>Portfolio Value</h4>
    <p>$7,560</p>
  </div>

  <div class="stat">
    <h4>Total Invested</h4>
    <p>$8,334</p>
  </div>

  <div class="stat">
    <h4>Total P/L</h4>
    <p class="red">-$774</p>
  </div>

  <div class="stat">
    <h4>ROI</h4>
    <p class="red">-9.2%</p>
  </div>

</div>

<!-- ACTIONS -->
<div class="card">
  <button class="btn" id="depositBtn">Deposit</button>
  <button class="btn" id="withdrawBtn">Withdraw</button>
</div>

<!-- WATCHLIST -->
<div class="card">
  <h3>My Watchlist</h3>

  <div class="watchlist-item">
    <span>AAPL</span>
    <span class="green">$248.45</span>
  </div>

  <div class="watchlist-item">
    <span>MSFT</span>
    <span class="green">$468.54</span>
  </div>

  <div class="watchlist-item">
    <span>TSLA</span>
    <span class="red">$447.65</span>
  </div>

  <div class="watchlist-item">
    <span>GOOGL</span>
    <span class="red">$327.99</span>
  </div>

</div>

<!-- NAV -->
<div class="nav">
  <span>🏠</span>
  <span>💰</span>
  <span>📊</span>
  <span>👤</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
  "https://xuueibsdniefncdbnfzn.supabase.co",
  "YOUR_ANON_KEY"
);

// LOAD USER
async function loadUser() {

  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const { data } = await supabase
    .from("users")
    .select("*")
    .eq("email", user.email)
    .single();

  if (data) {
    document.getElementById("username").innerText = data.name;
    document.getElementById("balance").innerText = data.balance;
  }
}

loadUser();

// NAV BUTTONS
document.getElementById("depositBtn").onclick = () => {
  window.location.href = "deposit.html";
};

document.getElementById("withdrawBtn").onclick = () => {
  window.location.href = "withdraw.html";
};
</script>

</body>
</html>
