<!DOCTYPE html>
<html>
<head>
  <title>Deposit</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    .card {
      max-width: 400px;
      margin: 30px auto;
      padding: 20px;
      border-radius: 20px;
      background: #111827;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .qr {
      background: white;
      padding: 15px;
      border-radius: 15px;
      display: inline-block;
      margin: 20px 0;
    }

    .address-container {
      position: relative;
      background: #020617;
      border-radius: 12px;
      padding: 12px;
      text-align: left;
      margin-top: 10px;
    }

    .address-text {
      word-break: break-all;
      font-size: 14px;
      padding-right: 50px;
    }

    .copy-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      background: #1f2937;
      color: white;
      transition: 0.3s;
    }

    .copy-btn.copied {
      background: #22c55e;
      color: black;
    }

    h2 {
      margin-bottom: 10px;
    }

    .main-btn {
      margin: 30px auto;
      padding: 14px;
      width: 90%;
      border: none;
      border-radius: 30px;
      background: linear-gradient(90deg, #7c3aed, #22c55e);
      color: white;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- BTC -->
<div class="card">
  <h2>Bitcoin (BTC)</h2>
  <div id="btc-qr" class="qr"></div>

  <div class="address-container">
    <div class="address-text" id="btc">
      bc1qm4vsnpd0d8vw8djkkuncq2smmwdzgkd50dka42
    </div>
    <button class="copy-btn" onclick="copyWallet('btc', this)">Copy</button>
  </div>
</div>

<!-- ETH -->
<div class="card">
  <h2>Ethereum (ETH)</h2>
  <div id="eth-qr" class="qr"></div>

  <div class="address-container">
    <div class="address-text" id="eth">
      0x6f9C7147fE1557fd02636fceF8AF7Fe4C7D97598
    </div>
    <button class="copy-btn" onclick="copyWallet('eth', this)">Copy</button>
  </div>
</div>

<!-- USDT -->
<div class="card">
  <h2>USDT (ERC20)</h2>
  <div id="usdt-qr" class="qr"></div>

  <div class="address-container">
    <div class="address-text" id="usdt">
      0x6f9C7147fE1557fd02636fceF8AF7Fe4C7D97598
    </div>
    <button class="copy-btn" onclick="copyWallet('usdt', this)">Copy</button>
  </div>
</div>

<!-- TRON -->
<div class="card">
  <h2>TRON (TRX)</h2>
  <div id="trx-qr" class="qr"></div>

  <div class="address-container">
    <div class="address-text" id="trx">
      TMBFUvhf1dYsP4HWEgYwQTnWkXoPN1oEBa
    </div>
    <button class="copy-btn" onclick="copyWallet('trx', this)">Copy</button>
  </div>
</div>

<!-- SOL -->
<div class="card">
  <h2>Solana (SOL)</h2>
  <div id="sol-qr" class="qr"></div>

  <div class="address-container">
    <div class="address-text" id="sol">
      9bUR9HJCNhBsQr1mmVotYxPpkGAtkFKkYkQziYiNvZki
    </div>
    <button class="copy-btn" onclick="copyWallet('sol', this)">Copy</button>
  </div>
</div>

<button class="main-btn">
  I HAVE SENT PAYMENT
</button>

<script>
function copyWallet(id, btn) {
  const text = document.getElementById(id).innerText;

  navigator.clipboard.writeText(text).then(() => {
    btn.innerText = "Copied!";
    btn.classList.add("copied");

    setTimeout(() => {
      btn.innerText = "Copy";
      btn.classList.remove("copied");
    }, 2000);
  });
}

// QR CODES
new QRCode(document.getElementById("btc-qr"), {
  text: "bc1qm4vsnpd0d8vw8djkkuncq2smmwdzgkd50dka42",
  width: 200,
  height: 200
});

new QRCode(document.getElementById("eth-qr"), {
  text: "0x6f9C7147fE1557fd02636fceF8AF7Fe4C7D97598",
  width: 200,
  height: 200
});

new QRCode(document.getElementById("usdt-qr"), {
  text: "0x6f9C7147fE1557fd02636fceF8AF7Fe4C7D97598",
  width: 200,
  height: 200
});

new QRCode(document.getElementById("trx-qr"), {
  text: "TMBFUvhf1dYsP4HWEgYwQTnWkXoPN1oEBa",
  width: 200,
  height: 200
});

new QRCode(document.getElementById("sol-qr"), {
  text: "9bUR9HJCNhBsQr1mmVotYxPpkGAtkFKkYkQziYiNvZki",
  width: 200,
  height: 200
});
</script>

</body>
</html>
