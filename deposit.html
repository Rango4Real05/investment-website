<!DOCTYPE html>
<html>
<head>
  <title>Deposit</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background: url('https://images.unsplash.com/photo-1639322537228-f710d846310a') no-repeat center center/cover;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .box {
      background: rgba(0,0,0,0.8);
      padding: 20px;
      margin: 20px auto;
      border-radius: 15px;
      max-width: 400px;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
      border: none;
      background: #00ff88;
      color: black;
      font-weight: bold;
      cursor: pointer;
      border-radius: 5px;
    }

    input {
      width: 80%;
      padding: 10px;
      margin-top: 10px;
    }

    img {
      width: 200px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>Deposit Funds</h1>

<input id="amount" type="number" placeholder="Enter amount" />

<!-- BTC -->
<div class="box">
  <h2>Bitcoin (BTC)</h2>
  <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=bc1qm4vsnpd0d8vw8djkkuncq2smmwdzgkd50dka42">
  <p id="btc">bc1qm4vsnpd0d8vw8djkkuncq2smmwdzgkd50dka42</p>
  <button onclick="copyWallet('btc')">Copy Address</button>
</div>

<!-- ETH -->
<div class="box">
  <h2>Ethereum (ETH)</h2>
  <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=0x6f9C7147fE1557fd02636fceF8AF7Fe4C7D97598">
  <p id="eth">0x6f9C7147fE1557fd02636fceF8AF7Fe4C7D97598</p>
  <button onclick="copyWallet('eth')">Copy Address</button>
</div>

<!-- USDT -->
<div class="box">
  <h2>USDT (ERC20)</h2>
  <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=0x6f9C7147fE1557fd02636fceF8AF7Fe4C7D97598">
  <p id="usdt">0x6f9C7147fE1557fd02636fceF8AF7Fe4C7D97598</p>
  <button onclick="copyWallet('usdt')">Copy Address</button>
</div>

<!-- SOL -->
<div class="box">
  <h2>Solana (SOL)</h2>
  <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=GxBQcvYBEsFjn2k9gotk9ScsWZeucGNYwNaLutc2gz41">
  <p id="sol">GxBQcvYBEsFjn2k9gotk9ScsWZeucGNYwNaLutc2gz41</p>
  <button onclick="copyWallet('sol')">Copy Address</button>
</div>

<button onclick="submitDeposit()">I Have Sent Payment</button>

<script>
const supabase = supabase.createClient(
  "https://xuueibsdniefncdbnfzn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

// COPY FIXED
function copyWallet(id) {
  const text = document.getElementById(id).innerText;

  navigator.clipboard.writeText(text).then(() => {
    alert("Copied: " + text);
  }).catch(() => {
    alert("Copy failed, copy manually");
  });
}

// SUBMIT DEPOSIT
async function submitDeposit() {
  const amount = document.getElementById("amount").value;

  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    alert("Login first");
    return;
  }

  await supabase.from("deposits").insert([
    {
      email: user.email,
      amount: amount,
      status: "pending"
    }
  ]);

  alert("Deposit submitted. Await confirmation.");
}
</script>

</body>
</html>
