<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Platform</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb') no-repeat center center/cover;
}

/* OVERLAY */
.overlay {
  background: rgba(0,0,0,0.75);
  min-height: 100vh;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: center;
  gap: 15px;
  padding: 15px;
  background: black;
}

.navbar button {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, gold, orange);
  font-weight: bold;
  cursor: pointer;
}

/* MARKET SLIDE */
.ticker {
  display: flex;
  overflow: hidden;
  background: black;
  color: gold;
  padding: 10px;
  font-weight: bold;
  gap: 40px;
  animation: slide 20s linear infinite;
}

@keyframes slide {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}

/* HERO */
.hero {
  padding: 60px 20px;
}

.hero h1 {
  font-size: 40px;
}

.hero p {
  max-width: 400px;
}

/* CALCULATOR */
.calculator {
  position: absolute;
  top: 100px;
  right: 20px;

  width: 260px;
  padding: 15px;

  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(10px);

  border-radius: 15px;
  box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
}

.calculator input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
}

.calculator button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(45deg, gold, orange);
  cursor: pointer;
}

#result {
  text-align: center;
  margin-top: 10px;
  color: #00ffcc;
}

/* STATS */
.stats {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 40px;
}

.stat {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

/* MOBILE */
@media (max-width: 768px) {
  .calculator {
    position: relative;
    top: 0;
    right: 0;
    width: 90%;
    margin: 20px auto;
  }

  .stats {
    flex-direction: column;
    align-items: center;
  }
}
</style>
</head>

<body>

<div class="overlay">

<!-- NAVBAR -->
<div class="navbar">
  <button onclick="goSignup()">Create Account</button>
  <button onclick="goLogin()">Login</button>
  <button onclick="goPlans()">Plans</button>
</div>

<!-- MARKET -->
<div class="ticker">
  BTC $67,492 | ETH $2,053 | Gold $2,350 | EUR/USD 1.08 | AAPL $180 | TSLA $240
</div>

<!-- HERO -->
<div class="hero">
  <h1>Invest Smarter. Grow Faster.</h1>
  <p>Join thousands earning daily profits with our automated investment platform.</p>
</div>

<!-- CALCULATOR -->
<div class="calculator">
  <h3 style="text-align:center;">Calculator</h3>

  <input type="number" id="amount" placeholder="Amount ($)">
  <input type="number" id="days" placeholder="Days">

  <button onclick="calculate()">Calculate</button>

  <p id="result"></p>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat">
    <h2>1212+</h2>
    <p>Users</p>
  </div>
  <div class="stat">
    <h2>$2.4M</h2>
    <p>Paid Out</p>
  </div>
  <div class="stat">
    <h2>24/7</h2>
    <p>Support</p>
  </div>
</div>

</div>

<script>
// NAVIGATION
function goSignup() {
  window.location.href = "signup.html";
}

function goLogin() {
  window.location.href = "login.html";
}

function goPlans() {
  window.location.href = "plans.html";
}

// CALCULATOR
function calculate() {
  let amount = parseFloat(document.getElementById("amount").value);
  let days = parseInt(document.getElementById("days").value);

  if (!amount || !days) {
    document.getElementById("result").innerText = "Enter amount & days";
    return;
  }

  let rate = 0.02;
  if (amount >= 300) rate = 0.05;
  if (amount >= 1000) rate = 0.1;

  let profit = amount * rate * days;
  let total = amount + profit;

  document.getElementById("result").innerText =
    "Profit: $" + profit.toFixed(2) + " | Total: $" + total.toFixed(2);
}
</script>

</body>
</html>
