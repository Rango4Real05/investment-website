<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: url('https://images.unsplash.com/photo-1607746882042-944635dfe10e') no-repeat center center/cover;
}

/* OVERLAY */
.overlay {
  background: rgba(0,0,0,0.8);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* FORM BOX */
.form-box {
  background: rgba(0,0,0,0.7);
  padding: 25px;
  border-radius: 15px;
  width: 300px;
  box-shadow: 0 0 20px rgba(255,215,0,0.2);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, gold, orange);
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="overlay">

<div class="form-box">
  <h2>Create Account</h2>

  <input type="text" id="name" placeholder="Full Name">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <!-- PLAN SELECT -->
  <select id="plan">
    <option value="Starter">Starter ($50)</option>
    <option value="Basic">Basic ($100)</option>
    <option value="Premium">Premium ($200)</option>
  </select>

  <!-- ✅ NO onclick (FIXED) -->
  <button id="signupBtn">Create Account</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const supabase = window.supabase.createClient(
    "https://xuueibsdniefncdbnfzn.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1dWVpYnNkbmllZm5jZGJuZnpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNzM2MzksImV4cCI6MjA5MDY0OTYzOX0.CemivJ22fNWnLpMUHZPUiZoH12cg-az7k95PtKMFzf4"
  );

  const btn = document.getElementById("signupBtn");

  btn.addEventListener("click", async function () {

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const plan = document.getElementById("plan").value;

    if (!name || !email || !password) {
      alert("Please fill all fields");
      return;
    }

    const { error } = await supabase.auth.signUp({
      email: email,
      password: password
    });

    if (error) {
      alert(error.message);
      return;
    }

    await supabase.from("users").insert([
      {
        email: email,
        name: name,
        plan: plan,
        balance: 0
      }
    ]);

    alert("Account created successfully!");
    window.location.href = "dashboard.html";

  });

});
</script>

</body>
</html>
