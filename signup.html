<!DOCTYPE html>
<html>
<head>
  <title>Sign Up</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 100px;
    }

    input {
      padding: 10px;
      margin: 10px;
      width: 250px;
    }

    button {
      padding: 10px 20px;
      background: gold;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Create Account</h1>

<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>

<button onclick="signup()">Sign Up</button>

<p id="message"></p>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://xuueibsdniefncdbnfzn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1dWVpYnNkbmllZm5jZGJuZnpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNzM2MzksImV4cCI6MjA5MDY0OTYzOX0.CemivJ22fNWnLpMUHZPUiZoH12cg-az7k95PtKMFzf4"
);

window.signup = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({
    email,
    password
  });

  if (error) {
    document.getElementById("message").innerText = error.message;
  } else {

    // create user record
    await supabase.from("users").insert([
      { email, balance: 0, plan: "Starter", plan_status: "active" }
    ]);

    document.getElementById("message").innerText =
      "Account created ✅ Go login";
  }
};
</script>

</body>
</html>
